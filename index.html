<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STS2 CRNG Lab</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="control-panel" aria-label="Run observations">
        <div class="brand-block">
          <p class="eyebrow">Slay the Spire 2</p>
          <h1>CRNG Lab</h1>
          <p class="source-note">Article-seeded predictions for beta v0.107.0, built to be replaced by simulator data.</p>
        </div>

        <form id="run-form" class="run-form">
          <input type="hidden" id="patch" name="patch" value="v0.107.0">
          <input type="hidden" id="mode" name="mode" value="single">
          <input type="hidden" id="playerOffset" name="playerOffset" value="">

          <section class="panel-section">
            <h2>1. Start</h2>
            <label>
              Character
              <select id="character" name="character">
                <option value="unknown">Unknown</option>
                <option value="ironclad">Ironclad</option>
                <option value="silent">Silent</option>
                <option value="defect">Defect</option>
                <option value="necrobinder">Necrobinder</option>
                <option value="regent">Regent</option>
              </select>
            </label>

            <label>
              Starting act
              <select id="act" name="act">
                <option value="unknown">Unknown</option>
                <option value="underdocks">Underdocks</option>
                <option value="overgrowth">Overgrowth</option>
              </select>
            </label>
          </section>

          <section class="panel-section">
            <h2>2. Neow screen</h2>
            <label>
              Neow relic shown
              <select id="curseRelic" name="curseRelic">
                <option value="unknown">Not at Neow yet</option>
              </select>
            </label>

            <label>
              What you picked
              <select id="neowConsumption" name="neowConsumption">
                <option value="neutral">No card or random relic appeared</option>
                <option value="reward">A card reward or random relic appeared</option>
                <option value="niche">New Leaf or Kaleidoscope triggered</option>
                <option value="unknown">Not sure yet</option>
              </select>
            </label>
          </section>

          <section class="panel-section">
            <h2>3. First fight</h2>
            <label>
              Gold from fight 1
              <select id="firstFightGold" name="firstFightGold">
                <option value="unknown">Unknown</option>
              </select>
            </label>

            <label>
              First reward after fight 1
              <select id="firstRewardType" name="firstRewardType">
                <option value="unknown">Unknown</option>
                <option value="commonPotion">Common potion</option>
                <option value="uncommonPotion">Uncommon potion</option>
                <option value="rarePotion">Rare potion</option>
                <option value="commonCard">Common card</option>
              </select>
            </label>
          </section>
        </form>
      </aside>

      <section class="workspace" aria-live="polite">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Conditioned Predictions</p>
            <h2 id="summary-title">Add observations to narrow the run.</h2>
          </div>
          <button id="reset-button" type="button">Reset</button>
        </div>

        <div id="status-strip" class="status-strip"></div>
        <div id="next-actions" class="next-actions"></div>
        <div id="prediction-grid" class="prediction-grid"></div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
